<svg width="220" height="200" viewBox="0 0 220 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      /* Base Color: #54768F */
      .face-top {
        fill: #87A0B5; /* Lighter */
      }
      .face-front {
        fill: #54768F; /* Base */
      }
      .face-side {
        fill: #374D5E; /* Darker */
      }
    </style>
  </defs>

  <!-- Step 3 (Top) -->
  <g id="step3">
    <polygon points="100,60 160,60 190,40 130,40" class="face-top" />
    <polygon points="100,60 160,60 160,80 100,80" class="face-front" />
    <polygon points="160,60 190,40 190,60 160,80" class="face-side" />
  </g>

  <!-- Step 2 (Middle) -->
  <g id="step2">
    <polygon points="70,100 130,100 160,80 100,80" class="face-top" />
    <polygon points="70,100 130,100 130,120 70,120" class="face-front" />
    <polygon points="130,100 160,80 160,100 130,120" class="face-side" />
  </g>

  <!-- Step 1 (Bottom) -->
  <g id="step1">
    <polygon points="40,140 100,140 130,120 70,120" class="face-top" />
    <polygon points="40,140 100,140 100,160 40,160" class="face-front" />
    <polygon points="100,140 130,120 130,140 100,160" class="face-side" />
  </g>

</svg>
